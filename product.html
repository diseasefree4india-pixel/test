<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products – DEVDIC HERBAL</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:90px}
.filter-bar{background:#fff;padding:15px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;}
.filter-btn{padding:8px 15px;border-radius:20px;border:1px solid #ccc;cursor:pointer;}
.filter-btn.active{background:#059669;color:#fff;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px;}
.product-card{background:#fff;padding:20px;border-radius:10px;text-align:center;}
.empty-state{display:none;text-align:center;padding:40px;}
.empty-state.show{display:block;}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:#25D366;text-align:center;padding:15px;font-weight:bold;}
</style>
</head>

<body>

<div class="filter-bar">
<button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
<button class="filter-btn" onclick="filterProducts('capsule',this)">Capsule</button>
<button class="filter-btn" onclick="filterProducts('powder',this)">Powder</button>
<button class="filter-btn" onclick="filterProducts('syrup',this)">Syrup</button>
<input type="text" id="searchInput" placeholder="Search product..." oninput="searchProducts()">
</div>

<div class="products-grid">

<div class="product-card" data-category="capsule" data-name="db boost">DB BOOST</div>
<div class="product-card" data-category="capsule" data-name="db life">DB LIFE</div>
<div class="product-card" data-category="capsule" data-name="dabatas">DABATAS</div>

<div class="product-card" data-category="powder" data-name="db pan powder">DB PAN POWDER</div>

<div class="product-card" data-category="syrup" data-name="db pan 10">DB PAN 10</div>
<div class="product-card" data-category="syrup" data-name="quick qr">QUICK QR</div>

</div>

<div class="empty-state" id="emptyState">
<h3>Koi product nahi mila</h3>
</div>

<div class="bottom-bar">
WhatsApp Karein
</div>

<script>
let activeFilter="all";

function filterProducts(type,btn){
activeFilter=type;
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
applyFilters();
}

function searchProducts(){
applyFilters();
}

function applyFilters(){
const search=document.getElementById("searchInput").value.toLowerCase().trim();
const cards=document.querySelectorAll(".product-card");

let visible=0;

cards.forEach(card=>{
const cat=card.dataset.category;
const name=card.dataset.name;

// 🔥 ONLY FIX HERE (baaki sab same)
const matchFilter = (activeFilter==="all") || (cat===activeFilter);
const matchSearch = name.includes(search);

if(matchFilter && matchSearch){
card.style.display="";
visible++;
}else{
card.style.display="none";
}
});

const empty=document.getElementById("emptyState");
empty.classList.toggle("show", visible===0);
}
</script>

</body>
</html>
