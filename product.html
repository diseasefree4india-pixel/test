<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products – DEVDIC HERBAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-bottom:90px;
}

.filter-bar{
background:#fff;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
position:sticky;
top:0;
z-index:100;
}

.filter-btn{
padding:8px 15px;
border-radius:20px;
border:1px solid #ccc;
cursor:pointer;
}

.filter-btn.active{
background:#059669;
color:#fff;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product-card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
}

.empty-state{
text-align:center;
padding:50px;
display:none;
}

.empty-state.show{
display:block;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#25D366;
text-align:center;
padding:15px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- FILTER -->
<div class="filter-bar">
<button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
<button class="filter-btn" onclick="filterProducts('capsule',this)">Capsule</button>
<button class="filter-btn" onclick="filterProducts('powder',this)">Powder</button>
<button class="filter-btn" onclick="filterProducts('syrup',this)">Syrup</button>

<input type="text" id="searchInput" placeholder="Search..." oninput="searchProducts(this.value)">
</div>

<!-- PRODUCTS -->
<div class="products-grid" id="productsGrid">

<div class="product-card" data-category="capsule" data-name="db boost">DB BOOST</div>
<div class="product-card" data-category="capsule" data-name="db life">DB LIFE</div>
<div class="product-card" data-category="powder" data-name="db powder">DB POWDER</div>
<div class="product-card" data-category="syrup" data-name="db syrup">DB SYRUP</div>

</div>

<div class="empty-state" id="emptyState">
<h3>Koi product nahi mila</h3>
</div>

<div class="bottom-bar">
WhatsApp Karein
</div>

<script>
let activeFilter="all";

function filterProducts(type,btn){
activeFilter=type;

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

applyFilters();
}

function searchProducts(){
applyFilters();
}

function applyFilters(){
const search=document.getElementById("searchInput").value.toLowerCase().trim();
const cards=document.querySelectorAll(".product-card");

let visible=0;

cards.forEach(card=>{
const cat=card.dataset.category.toLowerCase();
const name=card.dataset.name.toLowerCase();

const matchFilter = (activeFilter==="all") || (cat===activeFilter);
const matchSearch = name.includes(search);

if(matchFilter && matchSearch){
card.style.display="block";
visible++;
}else{
card.style.display="none";
}
});

const empty=document.getElementById("emptyState");

if(visible===0){
empty.classList.add("show");
}else{
empty.classList.remove("show");
}
}
</script>

</body>
</html>
